<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MidiCam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/favicon.svg">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/piano.css">
    <link rel="stylesheet" type="text/css" href="css/metronome.css">
</head>
<body>
    <main>
        <div id="additionalStreamsContainer"></div>
        <div id="metronomeContainer"></div>
        <section id="cams">
            <video id="remoteVideo" autoplay></video>
            <div id="localVideoWrapper" style="display: none;">
                <video id="localVideo" autoplay muted></video>
                <div id="resizeHandle"></div>
            </div>
        </section>
        <section id="sidebar-right">
            <section id="connection">
                <div class="title">Connection</div>
                <div>
                    <label for="serverUrl">Server URL:</label>
                    <input type="text" id="serverUrl" placeholder="z. B. http://localhost:8080 oder https://tunnelmole-url.net">
                    <button id="startConnection">Start</button>
                </div>
            </section>
            <section id="devices">
                <div class="title">Devices</div>
                <div>
                    <label for="videoSelect">Camera:</label>
                    <select id="videoSelect"></select>
                    <label for="audioSelect">Microphone:</label>
                    <select id="audioSelect"></select>
                </div>
                <div>
                    <label for="midiSelect">MIDI-Input:</label>
                    <select id="midiSelect"></select>
                    <label for="midiOutputSelect">MIDI-Output:</label>
                    <select id="midiOutputSelect"></select>
                </div>
                <div class="volume-controls-container">
                    <div class="volume-control">
                        <img src="assets/volume_locale.svg" id="micVolumeIcon" title="Mute your microphone">
                        <input type="range" id="micVolume" min="0" max="1" step="0.05" value="1" title="Your microphone volume">
                    </div>
                    <div class="volume-control">
                        <img src="assets/volume_remote.svg" id="remoteVolumeIcon" title="Mute remote user">
                        <input type="range" id="remoteVolume" min="0" max="1" step="0.05" value="1" title="Remote user volume">
                    </div>
                </div>
            </section>
            <section id="filesharing-container"></section>
            <section id="chat-container" class="chat-module">
                <div class="title">Chat</div>
                <div class="chat-messages" role="log" aria-live="polite"></div>
                <form class="chat-form" aria-label="Send message">
                    <input type="text" class="chat-input" placeholder="Chat not connected" required aria-required="true" disabled>
                    <button type="submit" class="chat-send-button" disabled title="Send message">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </form>
            </section>
            <section id="tools">
                 <div class="title">Tools</div>
                 <button id="toggleMetronome" disabled>Metronom</button>
                 <button id="shareScreenButton" disabled>Bildschirm teilen</button>
                 <button id="toggleLogButton">Log</button>
            </section>
        </section>
        <section id="piano"></section>
    </main>

    <script src="js/app.js" type="module"></script>
</body>
</html>
