<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MidiCamDigga</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/favicon.svg">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/piano.css">
    <link rel="stylesheet" type="text/css" href="css/metronome.css">
</head>
<body>
    <main>
        <section id="cams">
            <video id="remoteVideo" autoplay></video>
            <div id="localVideoWrapper">
                <video id="localVideo" autoplay muted></video>
                <div id="resizeHandle"></div>
            </div>
        </section>
        <section id="sidebar-right">
            <section id="connection">
                <div class="title">Connection</div>
                <div>
                    <label for="serverUrl">Server URL:</label>
                    <input type="text" id="serverUrl" placeholder="z. B. http://localhost:8080 oder https://tunnelmole-url.net">
                    <button id="startConnection">Start</button>
                </div>
            </section>
            <section id="devices">
                <div class="title">Devices</div>
                <div>
                    <label for="videoSelect">Kamera:</label>
                    <select id="videoSelect"></select>
                    <label for="audioSelect">Mikrofon:</label>
                    <select id="audioSelect"></select>
                </div>
                <div>
                    <label for="micVolume">Mikrofon-Lautstärke:</label>
                    <input type="range" id="micVolume" min="0" max="1" step="0.1" value="1">
                </div>
                <div>
                    <label for="midiSelect">MIDI-Eingang:</label>
                    <select id="midiSelect"></select>
                    <label for="midiOutputSelect">MIDI-Ausgang:</label>
                    <select id="midiOutputSelect"></select>
                </div>
            </section>
            <section>
                <div class="title">Filesharing</div>
                <div id="fileList">
                    <p>Drop file here</p>
                </div>
            </section>
            <section id="chat">
                <div class="title">Chat</div>
                <div id="chat-msgs" role="log" aria-live="polite"></div>
                <form id="chat-form" aria-label="Chat-Nachrichten senden">
                    <label for="messageInput">Nachricht:</label>
                    <input type="text" id="messageInput" placeholder="Nachricht eingeben" required aria-required="true">
                    <button type="submit">Senden</button>
                </form>
            </section>
            <section id="log">
                <div class="title">Log</div>
                <div id="log-msgs"></div>
            </section>
        </section>
        <section id="piano"></section>
    </main>
    <script src="js/app.js" type="module"></script>
</body>
</html>
