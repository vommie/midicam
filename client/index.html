<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MidiCam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/favicon.svg">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/piano.css">
    <link rel="stylesheet" type="text/css" href="css/metronome.css">
</head>
<body>
    <main>
        <div id="metronomeContainer"></div>
        <section id="cams">
            <video id="remoteVideo" autoplay></video>
            <div id="localVideoWrapper">
                <video id="localVideo" autoplay muted></video>
                <div id="resizeHandle"></div>
            </div>
        </section>
        <section id="sidebar-right">
            <section id="connection">
                <div class="title">Connection</div>
                <div>
                    <label for="serverUrl">Server URL:</label>
                    <input type="text" id="serverUrl" placeholder="z. B. http://localhost:8080 oder https://tunnelmole-url.net">
                    <button id="startConnection">Start</button>
                </div>
            </section>
            <section id="devices">
                <div class="title">Devices</div>
                <div>
                    <label for="videoSelect">Kamera:</label>
                    <select id="videoSelect"></select>
                    <label for="audioSelect">Mikrofon:</label>
                    <select id="audioSelect"></select>
                </div>
                <div>
                    <label for="midiSelect">MIDI-Eingang:</label>
                    <select id="midiSelect"></select>
                    <label for="midiOutputSelect">MIDI-Ausgang:</label>
                    <select id="midiOutputSelect"></select>
                </div>
                <div class="volume-controls-container">
                    <div class="volume-control">
                        <img src="assets/volume_locale.svg" id="micVolumeIcon" title="Mute your microphone">
                        <input type="range" id="micVolume" min="0" max="1" step="0.05" value="1" title="Your microphone volume">
                    </div>
                    <div class="volume-control">
                        <img src="assets/volume_remote.svg" id="remoteVolumeIcon" title="Mute remote user">
                        <input type="range" id="remoteVolume" min="0" max="1" step="0.05" value="1" title="Remote user volume">
                    </div>
                </div>
            </section>
            <section>
                <div class="title">Filesharing</div>
                <div id="fileList">
                    <p>Drop file here</p>
                </div>
            </section>
            <section id="chat">
                <div class="title">Chat</div>
                <div id="chat-msgs" role="log" aria-live="polite"></div>
                <form id="chat-form" aria-label="Chat-Nachrichten senden">
                    <label for="messageInput">Message:</label>
                    <input type="text" id="messageInput" placeholder="Input" required aria-required="true">
                    <button type="submit">Send</button>
                </form>
            </section>
            <section id="tools">
                 <div class="title">Tools</div>
                 <button id="toggleMetronome" disabled>Metronom</button>
            </section>
            <section id="log">
                <div class="title">Log</div>
                <div id="log-msgs"></div>
            </section>
        </section>
        <section id="piano"></section>
    </main>
    <script src="js/app.js" type="module"></script>
</body>
</html>
