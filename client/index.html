<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MidiCamDigga</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        video { width: 300px; border: 1px solid #ccc; }
        #log { white-space: pre-wrap; }
        #chat { white-space: pre-wrap; border: 1px solid #ccc; height: 200px; overflow-y: auto; }
        #messageInput { width: 200px; }
        #fileList {
            border: 1px solid #ccc;
            min-height: 100px;
            padding: 10px;
            margin-top: 10px;
            background: #f9f9f9;
        }
        #fileList.dragover {
            background: #e0e0e0;
        }
        .file-item {
            padding: 5px;
            display: flex;
            align-items: center;
            position: relative;
        }
        .file-item.sent {
            background: #d4edda;
        }
        .file-item.received {
            background: #cce5ff;
        }
        .file-item a {
            color: inherit;
            text-decoration: underline;
            margin-left: 5px;
        }
        .file-item .progress-container {
            width: 100%;
            background: #ddd;
            height: 10px;
            position: absolute;
            bottom: 0;
            left: 0;
            display: none;
        }
        .file-item .progress-bar {
            height: 100%;
            background: #4caf50;
            width: 0;
            transition: width 0.3s;
        }
        .file-item .progress-text {
            position: absolute;
            top: -20px;
            right: 5px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>MidiCamDigga</h1>
    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
    <button onclick="startCall()">Anruf starten</button>
    <button onclick="connectMidi()">MIDI connecten</button>
    <div>
        <label for="videoSelect">Kamera:</label>
        <select id="videoSelect" onchange="switchMedia()"></select>
    </div>
    <div>
        <label for="audioSelect">Mikrofon:</label>
        <select id="audioSelect" onchange="switchMedia()"></select>
    </div>
    <div>
        <label for="micVolume">Mikrofon-Lautstärke:</label>
        <input type="range" id="micVolume" min="0" max="1" step="0.1" value="1" oninput="adjustMicVolume()">
    </div>
    <div>
        <label for="midiSelect">MIDI-Eingang:</label>
        <select id="midiSelect" onchange="connectMidi()"></select>
    </div>
    <div>
        <label for="midiOutputSelect">MIDI-Ausgang:</label>
        <select id="midiOutputSelect" onchange="saveSettings()"></select>
    </div>
    <div id="fileList" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
        <p>Dateien hierher ziehen oder fallen lassen</p>
    </div>
    <pre id="log"></pre>

    <h2>Chat</h2>
    <div id="chat"></div>
    <input type="text" id="messageInput" placeholder="Nachricht eingeben">
    <button onclick="sendChatMessage()">Senden</button>

    <script src="js/app.js"></script>
</body>
</html>
