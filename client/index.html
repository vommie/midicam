<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MidiCam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/favicon.svg">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/piano.css">
    <link rel="stylesheet" type="text/css" href="css/metronome.css">
</head>
<body>
    <main>
        <div id="additionalStreamsContainer"></div>
        <div id="metronomeContainer"></div>
        <section id="cams">
            <video id="remoteVideo" autoplay></video>
            <div id="localVideoWrapper" style="display: none;">
                <video id="localVideo" autoplay muted></video>
                <div id="resizeHandle"></div>
            </div>
        </section>

        <section id="sidebar-right">
            <div id="sidebar-resize-handle" data-tooltip="Drag to resize"></div>
            <div id="sidebar-content-wrapper">
                <section id="connection" class="sidebar-section">
                    <div class="sidebar-section-header">
                        <span class="title">Connection</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </div>
                    <div class="sidebar-section-content">
                        <div class="form-group">
                            <label for="serverUrl">Server URL</label>
                            <div class="connection-row">
                                <input type="text" id="serverUrl" placeholder="e.g., http://localhost:8080" data-tooltip="Enter the server URL...">
                                <button id="startConnection" data-tooltip="Connect to or disconnect from the server">Start</button>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="devices" class="sidebar-section">
                    <div class="sidebar-section-header">
                        <span class="title">Devices</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </div>
                    <div class="sidebar-section-content">
                        <div class="form-group"><label for="videoSelect">Camera</label><div class="custom-select-wrapper"><select id="videoSelect" data-tooltip="Select your video input device"></select></div></div>
                        <div class="form-group"><label for="audioSelect">Microphone</label><div class="custom-select-wrapper"><select id="audioSelect" data-tooltip="Select your audio input device"></select></div></div>
                        <div class="form-group"><label for="midiSelect">MIDI Input</label><div class="custom-select-wrapper"><select id="midiSelect" data-tooltip="Select your MIDI input device for playing notes"></select></div></div>
                        <div class="form-group"><label for="midiOutputSelect">MIDI Output</label><div class="custom-select-wrapper"><select id="midiOutputSelect" data-tooltip="Select a MIDI output to forward received notes to a hardware device"></select></div></div>
                    </div>
                </section>

                <section id="volumes" class="sidebar-section">
                    <div class="sidebar-section-header">
                        <span class="title">Volume</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </div>
                    <div class="sidebar-section-content">
                        <div class="volume-control"><label for="micVolume">My Volume (sent)</label><div class="slider-wrapper"><button id="micVolumeIcon" class="mute-button" data-tooltip="Mute/unmute your microphone"><svg class="icon-vol-on" viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg><svg class="icon-vol-off" viewBox="0 0 24 24"><path d="M19 11h-1.7c0 .58-.1 1.13-.27 1.64l1.27 1.27c.44-.88.7-1.87.7-2.91zM4.41 2.86L3 4.27l6 6V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.55-.9L19.73 21l1.41-1.41L4.41 2.86zM10.17 11l-2-2H9v2h1.17zM15 11V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.17l4.73 4.73c.65-1.03 1.27-2.22 1.27-3.9z"/></svg></button><input type="range" id="micVolume" min="0" max="1" step="0.05" value="1"></div></div>
                        <div class="volume-control"><label for="remoteVolume">Peer's Volume (received)</label><div class="slider-wrapper"><button id="remoteVolumeIcon" class="mute-button" data-tooltip="Mute/unmute the remote peer"><svg class="icon-vol-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg><svg class="icon-vol-off" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg></button><input type="range" id="remoteVolume" min="0" max="1" step="0.05" value="1"></div></div>
                    </div>
                </section>

                <section id="tools" class="sidebar-section">
                    <div class="sidebar-section-header">
                        <span class="title">Tools</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </div>
                    <div class="sidebar-section-content">
                        <button id="toggleMetronome" disabled data-tooltip="Toggle the shared metronome">Metronome</button>
                        <button id="shareScreenButton" disabled data-tooltip="Share your screen or a window with the peer">Share Screen</button>
                        <button id="toggleLogButton" data-tooltip="Show the developer log window">Show Log</button>
                    </div>
                </section>

                <section id="chat-container" class="chat-module sidebar-section">
                    <div class="sidebar-section-header">
                        <span class="title">Chat</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </div>
                    <div class="sidebar-section-content">
                        <div class="chat-messages" role="log" aria-live="polite"></div>
                        <form class="chat-form" aria-label="Send message"><input type="text" class="chat-input" placeholder="Chat not connected" required aria-required="true" disabled><button type="submit" class="chat-send-button" disabled data-tooltip="Send message"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button></form>
                    </div>
                </section>

                <section id="filesharing-container" class="sidebar-section">
                    <div class="sidebar-section-header">
                        <span class="title">File Sharing</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </div>
                    <div class="sidebar-section-content">
                        <div class="filesharing-dropzone" data-tooltip="Drag & drop files or double-click to send"><div class="dropzone-content"><svg class="dropzone-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"></path></svg><p class="dropzone-text-main">Drop files here</p><p class="dropzone-text-sub">or double click to upload</p></div></div>
                        <div class="filesharing-list" role="log"></div>
                        <input type="file" class="filesharing-input" multiple style="display: none;">
                    </div>
                </section>

            </div>
        </section>

        <section id="piano"></section>
    </main>

    <script src="js/app.js" type="module"></script>
</body>
</html>
